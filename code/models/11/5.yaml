# Ultralytics YOLO 🚀, AGPL-3.0 license
# Modified YOLO11 model with bidirectional FPN neck and standard conv in P4 fusion

nc: 2
scales:
  n: [0.50, 0.25, 1024]
  s: [0.50, 0.50, 1024]
  m: [0.50, 1.00, 512]
  l: [1.00, 1.00, 512]
  x: [1.00, 1.50, 512]
fusion_mode: SDI
backbone:
  - [-1, 1, Conv, [64, 3, 2]]  # 0-P1/2
  - [-1, 1, Conv, [128, 3, 2]]  # 1-P2/4
  - [-1, 2, C3k2, [256, False, 0.25]]
  - [-1, 1, Conv, [256, 3, 2]]  # 3-P3/8
  - [-1, 2, C3k2, [512, False, 0.25]]
  - [-1, 1, Conv, [512, 3, 2]]  # 5-P4/16
  - [-1, 2, C3k2, [512, True]]
  - [-1, 1, Conv, [1024, 3, 2]]  # 7-P5/32
  - [-1, 2, C3k2, [1024, True]]
  - [-1, 1, SPPF, [1024, 5]]  # 9
  - [-1, 2, C2PSA, [1024]]  # 10

head:
  # Top-down
  - [10 , 1, nn.Upsample, [None, 2, "nearest"]]   # 11
  - [-1, 1, Conv, [512, 1, 1]]                  # 12
                
  - [-1, 1, nn.Upsample, [None, 2, "nearest"]]   # 13
  - [-1, 1, Conv, [256, 1, 1]]                  # 14

  # Bottom-up
  - [2, 1, Conv, [256, 3, 2]]                   # 15
  - [-1, 1, Conv, [512, 3, 2]]                  # 16
  - [-1, 1, Conv, [1024, 3, 2]]                 # 17

  # P3 fusion
  - [4, 1, Conv, [256, 1, 1]]  # 🔧 将 512 → 256 18
  - [[14, 15, -1], 1, Fusion, [fusion_mode]]               # 19
  - [-1, 1, Conv, [256, 1, 1]]                  # 19              

  # P4 fusion
  - [[12, 16, 6], 1,Fusion, [fusion_mode]]              # 21
  - [-1, 1, Conv, [512, 1, 1]]                  # 22

  # P5 fusion
  - [[10, 17], 1, Fusion, [fusion_mode]]               # 23
  - [-1, 1, Conv, [1024, 1, 1]]                 # 24

  # Detect
  - [[19, 22, 24], 1, Detect, [nc]]             # Detect(P3, P4, P5)